// Luna Game 3D safety bindings for dialogue navigation.
// Keep W/S as movement keys, while also emitting menu up/down when choice lists are active.
alias +luna_dialog_up "+forward; menu_up"
alias -luna_dialog_up "-forward"
alias +luna_dialog_down "+back; menu_down"
alias -luna_dialog_down "-back"
bind w +luna_dialog_up
bind s +luna_dialog_down
bind f "puke 537"
bind l "puke 537"
